# ============================================================
# Rigup — PRODUCTION docker-compose (VPS + Caddy reverse proxy)
# Usage:
#   1. Copy .env.production.example → .env on the server
#   2. Edit DOMAIN, JWT_SECRET, DB passwords, AI_API_KEY
#   3. docker compose -f docker-compose.prod.yml up -d --build
# Caddy auto-issues Let's Encrypt SSL for ${DOMAIN}.
# ============================================================
services:
  mysql:
    image: mysql:8.0
    container_name: rigup-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    # ★ NO public port — DB is internal-only
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/db/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rigup-network

  core-api:
    build:
      context: ./backend/core-api
    container_name: rigup-core-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: https://${DOMAIN}
      TRUST_PROXY: "true"
      PAYMENTS_DEMO_MODE: ${PAYMENTS_DEMO_MODE:-true}
      QPAY_INVOICE_CODE: ${QPAY_INVOICE_CODE:-}
      QPAY_CLIENT_ID: ${QPAY_CLIENT_ID:-}
      QPAY_CLIENT_SECRET: ${QPAY_CLIENT_SECRET:-}
      QPAY_PUBLIC_BASE_URL: https://${DOMAIN}
    # ★ NO public port — Caddy proxies to it via internal network
    depends_on:
      mysql: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rigup-network

  agent-worker:
    build:
      context: ./backend/agent-worker
    container_name: rigup-agent-worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.groq.com/openai/v1}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      mysql: { condition: service_healthy }
      core-api: { condition: service_healthy }
    networks:
      - rigup-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: https://${DOMAIN}/api
        REACT_APP_GOOGLE_MAPS_API_KEY: ${REACT_APP_GOOGLE_MAPS_API_KEY:-}
        REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY:-}
        REACT_APP_FIREBASE_AUTH_DOMAIN: ${REACT_APP_FIREBASE_AUTH_DOMAIN:-}
        REACT_APP_FIREBASE_PROJECT_ID: ${REACT_APP_FIREBASE_PROJECT_ID:-}
        REACT_APP_FIREBASE_STORAGE_BUCKET: ${REACT_APP_FIREBASE_STORAGE_BUCKET:-}
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${REACT_APP_FIREBASE_MESSAGING_SENDER_ID:-}
        REACT_APP_FIREBASE_APP_ID: ${REACT_APP_FIREBASE_APP_ID:-}
        REACT_APP_FIREBASE_MEASUREMENT_ID: ${REACT_APP_FIREBASE_MEASUREMENT_ID:-}
    container_name: rigup-frontend
    restart: unless-stopped
    depends_on:
      core-api: { condition: service_healthy }
    networks:
      - rigup-network

  # ─── Caddy: reverse proxy + auto Let's Encrypt SSL ─────────
  caddy:
    image: caddy:2-alpine
    container_name: rigup-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - core-api
    networks:
      - rigup-network

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  rigup-network:
    driver: bridge
