services:
  # ─── MySQL 8 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: rigup-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # initdb runs *.sql files alphabetically on first boot only.
      # We renumber the schema as 000_ so it lands before migrations.
      - ./infra/db/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rigup-network

  # ─── core-api (HTTP service) ────────────────────────────
  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    container_name: rigup-core-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # true = pending_payment + demo invoice without QPay keys (set false when using real QPAY_*).
      PAYMENTS_DEMO_MODE: ${PAYMENTS_DEMO_MODE:-true}
      QPAY_INVOICE_CODE: ${QPAY_INVOICE_CODE:-}
      QPAY_CLIENT_ID: ${QPAY_CLIENT_ID:-}
      QPAY_CLIENT_SECRET: ${QPAY_CLIENT_SECRET:-}
      QPAY_USERNAME: ${QPAY_USERNAME:-}
      QPAY_PASSWORD: ${QPAY_PASSWORD:-}
      QPAY_PUBLIC_BASE_URL: ${QPAY_PUBLIC_BASE_URL:-}
      ALLOW_SIMULATE_PAYMENT: ${ALLOW_SIMULATE_PAYMENT:-}
      AGENT_RESPONSE_TIMEOUT_MS: ${AGENT_RESPONSE_TIMEOUT_MS:-45000}
      AGENT_POLL_INTERVAL_MS: ${AGENT_POLL_INTERVAL_MS:-250}
    ports:
      - "${CORE_API_PORT:-4000}:4000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rigup-network

  # ─── agent-worker (background service) ──────────────────
  agent-worker:
    build:
      context: ./backend/agent-worker
      dockerfile: Dockerfile
    container_name: rigup-agent-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.groq.com/openai/v1}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
      AGENT_POLL_INTERVAL_MS: ${AGENT_WORKER_POLL_INTERVAL_MS:-250}
      AGENT_MAX_TOOL_ROUNDS: ${AGENT_MAX_TOOL_ROUNDS:-8}
      AGENT_HEALTH_PORT: 8090
    depends_on:
      mysql:
        condition: service_healthy
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rigup-network

  # ─── frontend (nginx serving CRA build) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000/api}
        REACT_APP_GOOGLE_MAPS_API_KEY: ${REACT_APP_GOOGLE_MAPS_API_KEY:-}
    container_name: rigup-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - rigup-network

volumes:
  mysql_data:

networks:
  rigup-network:
    driver: bridge
