apiVersion: v1
kind: Secret
metadata:
  name: rigup-secrets
  namespace: rigup
type: Opaque
stringData:
  MYSQL_PASSWORD: replace_with_strong_db_password
  MYSQL_ROOT_PASSWORD: replace_with_strong_root_password
  DATABASE_URL: mysql://rigup:replace_with_strong_db_password@mysql:3306/rigup
  JWT_SECRET: replace_me_with_very_strong_secret_minimum_32_chars
  AI_API_KEY: ""
